<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RiceMart — Rice Inventory System</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    body { display:flex; align-items:center; justify-content:center; min-height:100vh; flex-direction:column; gap:20px; background: linear-gradient(135deg, #1a3a2a 0%, #2e8050 100%); }
    .splash-logo { width:72px; height:72px; background:rgba(255,255,255,.15); border-radius:20px; display:flex; align-items:center; justify-content:center; font-size:36px; color:white; margin-bottom:8px; }
    .splash-title { font-family:'Plus Jakarta Sans',sans-serif; font-size:32px; font-weight:800; color:white; }
    .splash-sub { color:rgba(255,255,255,.6); font-size:15px; }
    .splash-btn { margin-top:8px; padding:12px 32px; background:white; color:#1e4d34; border-radius:10px; font-weight:700; font-family:'Plus Jakarta Sans',sans-serif; font-size:15px; display:inline-flex; align-items:center; gap:8px; transition:all .2s; }
    .splash-btn:hover { transform:translateY(-2px); box-shadow:0 8px 24px rgba(0,0,0,.3); }
    @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap');
  </style>
</head>
<body>
  <div class="splash-logo"><i class="fas fa-seedling"></i></div>
  <h1 class="splash-title">RiceMart</h1>
  <p class="splash-sub">Rice Inventory Management System</p>
  <a href="dashboard.html" class="splash-btn"><i class="fas fa-arrow-right"></i> Go to Dashboard</a>
  <script>
    // Auto-redirect after 1.5s
    setTimeout(() => { window.location.href = 'dashboard.html'; }, 1500);
  </script>
</body>
</html>
